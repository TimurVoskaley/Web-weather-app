<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/weather-favicon.png">
  <link rel="stylesheet" href="src/styles/main.css"/>
  <script src="./main.js" type="module" ></script>
  <title>Weather app</title>

</head>
<body>
  <header class="header">
    <div class="header__body container">
      <a
        class="header__logo logo"
        href="#"
        aria-label="Home"
        title="Home"
      >
        <img
          class="logo__image"
          src="./assets/images/logo.svg"
          alt=""
          width="197"
          height="40"
        />
      </a>
      <div class="header__button-wrapper">
        <button
          class="header__button units-button"
          type="button"
          data-js-units-button
        >
          <img
            class="units-button__settings-icon"
            src="./assets/images/icon-units.svg"
            alt=""
            width="16"
            height="16"
          />
          <span>Units</span>
          <img class="units-button__arrow-icon"
               src="./assets/images/icon-dropdown.svg" alt="" width="12" height="18" />
        </button>

        <div class="units-button__menu dropdown header-dropdown" data-js-header-dropdown>
          <button
            class="header-dropdown__btn"
            type="button"
            data-js-header-dropdown-button
          >
            <p>Switch to Imperial</p>
          </button>

          <div class="header-dropdown__info">
            <section class="header-dropdown__section">
              <p class="header-dropdown__section-title">Temperature</p>
              <ul class="header-dropdown__section-list">
                <li class="header-dropdown__section-item selected">Celsius (°C)</li>
                <li class="header-dropdown__section-item">Fahrenheit (°F)</li>
              </ul>
            </section>
            <section class="header-dropdown__section">
              <p class="header-dropdown__section-title">Wind Speed</p>
              <ul class="header-dropdown__section-list">
                <li class="header-dropdown__section-item selected">km/h</li>
                <li class="header-dropdown__section-item">mph</li>
              </ul>
            </section>
            <section class="header-dropdown__section">
              <p class="header-dropdown__section-title">Precipitation</p>
              <ul class="header-dropdown__section-list">
                <li class="header-dropdown__section-item selected">Millimeters (mm)</li>
                <li class="header-dropdown__section-item">Inches (in)</li>
              </ul>
            </section>
          </div>
        </div>

      </div>

    </div>
  </header>

  <main class="container">
    <h1 class="main__title">How’s the sky looking today?</h1>

    <form class="search" role="search">
      <label for="city-search" class="search__label visually-hidden">Search for a city</label>
      <input
        class="search__input"
        type="text"
        name="place"
        id="city-search"
        aria-label="Enter city name"
        autocomplete="off"
        placeholder="Search for a place..."
        data-js-search-input
      >
      <button class="search__button" type="submit" data-js-search-button>Search</button>
    </form>

    <section class="weather"></section>
  </main>

  <footer class="attribution">
    <span>Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.</span>
    <span>Powered by <a href="https://open-meteo.com/">Open-meteo</a>.</span>
    <span>Coded by <a href="https://github.com/TimurVoskaley/Web-weather-app.git">Timur Voskaley</a>.</span>
  </footer>

</body>
</html>
